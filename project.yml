name: SuperSiri
options:
  bundleIdPrefix: com.supersiri
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: false

targets:
  SuperSiri:
    type: application
    platform: iOS
    sources:
      - path: SuperSiri
    entitlements:
      path: SuperSiri/Resources/SuperSiri.entitlements
      properties:
        com.apple.developer.homekit: true
    info:
      path: SuperSiri/Resources/Info.plist
      properties:
        CFBundleDisplayName: SuperSiri
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: SuperSiri uses the microphone so you can talk to your AI assistant.
        NSSpeechRecognitionUsageDescription: SuperSiri transcribes your voice into prompts for the AI assistant.
        NSCalendarsFullAccessUsageDescription: SuperSiri can check your schedule and create events when you ask it to.
        NSRemindersFullAccessUsageDescription: SuperSiri can list and create reminders when you ask it to.
        NSContactsUsageDescription: SuperSiri can look up contact details when you ask it to reach someone.
        NSCameraUsageDescription: SuperSiri uses the camera so you can snap a photo and ask about it.
        NSLocationWhenInUseUsageDescription: SuperSiri uses your location to find places near you when you ask.
        NSHomeKitUsageDescription: SuperSiri can control your smart home devices when you ask it to.
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.supersiri.app
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        ENABLE_PREVIEWS: true
